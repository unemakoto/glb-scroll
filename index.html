<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite App</title>
  <link rel="stylesheet" href="/src/css/reset.css">
  <link rel="stylesheet" href="/src/css/loader.css">
  <link rel="stylesheet" href="/src/css/style.css">
  <script type="module" src="/src/js/index.js"></script>
</head>

<body>
  <header>header</header>

  <div style="text-align: center; margin-top: 200px;">
    ↓<br>
    ↓<br>
    SCROLL<br>
    ↓<br>
    ↓
  </div>

  <div style="margin-top: 100vh;"></div>

  <div id="stickyWrap1">
    <div class="stickyPart">
      <!-- 拡大率：20倍、y軸オフセット：+50px（639px以下は-mobile） -->
      <div
        data-glb="%VITE_MODEL_BASE%/letsnote03.glb"
        data-scale="20"
        data-offset="50"
        data-scale-mobile="12"
        data-offset-mobile="80"
      ></div>
      <div class="caption">一つ目のキャプションです。一つ目のキャプションです。</div>
    </div>
  </div>

  <div style="margin: 50vh 0; text-align: center;">
    （ダミー余白）
  </div>

  <div class="imageSection">
    <div>
      <img src="%VITE_IMAGE_BASE%/slider_1.jpg" alt="画像">
    </div>
    <p>通常のimgタグの画像です。通常のimgタグの画像です。</p>
  </div>

  <div style="margin: 50vh 0; text-align: center;">
    （ダミー余白）
  </div>

  <div id="stickyWrap2">
    <div class="stickyPart">
      <!-- 拡大率：2倍、y軸オフセット：+150px（639px以下は-mobile） -->
      <div
        data-glb="%VITE_MODEL_BASE%/iPhone3G.glb"
        data-scale="2"
        data-offset="150"
        data-scale-mobile="1.5"
        data-offset-mobile="120"
      ></div>
      <div class="caption">二つ目のキャプションです。二つ目のキャプションです。</div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div style="margin-top: 100vh;"></div>
  <footer>footer</footer>
</body>

</html>
